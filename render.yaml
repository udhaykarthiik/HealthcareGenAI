services:
  - type: web
    name: healthcaregenai
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn healthcore.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: healthcaregenai.onrender.com,localhost,127.0.0.1